services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: workout-board-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: workout
      POSTGRES_PASSWORD: workout
      POSTGRES_DB: workout_board
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workout -d workout_board"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

